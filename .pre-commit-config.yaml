repos:
  # -----------------------------
  # General file hygiene
  # -----------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml

  # -----------------------------
  # Python linting/formatting via backend container + uv
  # -----------------------------
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        entry: bash -c 'docker exec -w /app/backend backend uv run ruff check . --fix'

      - id: ruff-format
        name: ruff-format
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        entry: bash -c 'docker exec -w /app/backend backend uv run ruff format .'

  # -----------------------------
  # Frontend linting (auto-fix via Docker)
  # -----------------------------
  - repo: local
    hooks:
      - id: eslint
        name: eslint
        language: system
        files: ^frontend/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
        entry: bash -c 'docker exec -w /app/frontend frontend npx eslint . --fix'
