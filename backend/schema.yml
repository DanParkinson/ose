components:
  schemas:
    CategoryEnum:
      enum:
      - slide
      - worksheet
      - video
      - template
      - file
      - link
      type: string
      description: |-
        * `slide` - Slide
        * `worksheet` - Worksheet
        * `video` - Video
        * `template` - Template
        * `file` - File
        * `link` - Link
    LanguageEnum:
      enum:
      - en
      type: string
      description: '* `en` - English'
    LessonName:
      type: object
      properties:
        lesson_name_id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 100
        subjects:
          type: array
          items:
            type: string
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        is_protected:
          type: boolean
      required:
      - lesson_name_id
      - slug
      - subjects
      - title
    LessonVariantBySubjectList:
      type: object
      description: Used for listing LessonVariant before adding or loading resources
      properties:
        lesson_variant_id:
          type: string
          format: uuid
          readOnly: true
        subject:
          type: string
          readOnly: true
        topic:
          type: string
          readOnly: true
        lesson_name:
          type: string
          readOnly: true
        teaching_style:
          type: string
          readOnly: true
        variation:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        is_published:
          type: boolean
        is_protected:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        author:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          readOnly: true
      required:
      - author
      - created_at
      - lesson_name
      - lesson_variant_id
      - slug
      - subject
      - teaching_style
      - topic
      - updated_at
      - variation
    LessonVariantDetailReadOnly:
      type: object
      properties:
        lesson_variant_id:
          type: string
          format: uuid
          readOnly: true
        subject:
          type: string
          readOnly: true
        topic:
          type: string
          readOnly: true
        lesson_name:
          type: string
          readOnly: true
        teaching_style:
          type: string
          readOnly: true
        variation:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        is_published:
          type: boolean
          readOnly: true
        is_protected:
          type: boolean
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        author:
          type: string
          description: Required. 150 characters or fewer. Letters, digits and @/./+/-/_
            only.
          readOnly: true
      required:
      - author
      - created_at
      - is_protected
      - is_published
      - lesson_name
      - lesson_variant_id
      - slug
      - subject
      - teaching_style
      - topic
      - updated_at
      - variation
    LessonVariantResource:
      type: object
      properties:
        resource:
          allOf:
          - $ref: '#/components/schemas/ResourceBySubject'
          readOnly: true
        order:
          type: integer
          maximum: 2147483647
          minimum: 0
      required:
      - resource
    LessonVariantResourceAttach:
      type: object
      properties:
        resource:
          type: string
          format: uuid
      required:
      - resource
    LessonVariantUpdate:
      type: object
      description: |-
        Input serializer for updating a LessonVariant.
        Subject comes from the URL via serializer context.
        Topic and lesson_name are limited to values linked to that subject.
      properties:
        topic:
          type: string
        lesson_name:
          type: string
        teaching_style:
          type: string
        variation:
          type: string
        is_published:
          type: boolean
        is_protected:
          type: boolean
    LessonVariantWithNestedResourcesDetail:
      type: object
      properties:
        lesson_variant_id:
          type: string
          format: uuid
          readOnly: true
        subject:
          type: string
          readOnly: true
        topic:
          type: string
          readOnly: true
        lesson_name:
          type: string
          readOnly: true
        teaching_style:
          type: string
          readOnly: true
        variation:
          type: string
          readOnly: true
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        resources:
          type: array
          items:
            $ref: '#/components/schemas/LessonVariantResource'
          readOnly: true
        is_published:
          type: boolean
