    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    Topic:
      type: object
      properties:
        topic_id:
          type: string
          format: uuid
          readOnly: true
        subjects:
          type: array
          items:
            type: string
        title:
          type: string
          maxLength: 50
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        is_protected:
          type: boolean
      required:
      - slug
      - subjects
      - title
      - topic_id
    Variation:
      type: object
      properties:
        variation_id:
          type: string
          format: uuid
          readOnly: true
        title:
          type: string
          maxLength: 100
        slug:
          type: string
          readOnly: true
          pattern: ^[-a-zA-Z0-9_]+$
        is_protected:
          type: boolean
      required:
      - slug
      - title
      - variation_id
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: sessionid
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
